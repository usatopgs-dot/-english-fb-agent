services:
  - type: web
    name: english-fb-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --log-file -
    envVars:
      - key: GLM_API_KEY
        sync: false
      - key: GLM_ENDPOINT
        value: https://integrate.api.nvidia.com/v1/chat/completions
      - key: GLM_MODEL
        value: z-ai/glm-5.1
      - key: FB_PAGE_ID
        sync: false
      - key: FB_ACCESS_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: post-scheduler
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: GLM_API_KEY
        sync: false
      - key: GLM_ENDPOINT
        value: https://integrate.api.nvidia.com/v1/chat/completions
      - key: GLM_MODEL
        value: z-ai/glm-5.1
      - key: FB_PAGE_ID
        sync: false
      - key: FB_ACCESS_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true