<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 English Learning FB Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }
        .header h1 { color: #667eea; font-size: 2.5em; }
        .header p { color: #666; margin-top: 10px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .card h2 { color: #333; margin-bottom: 20px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: 600; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea { min-height: 200px; resize: vertical; font-family: monospace; }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 15px 0;
        }
        .stat-box {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .stat-number { font-size: 2em; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; font-size: 0.9em; }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .recent-posts { margin-top: 15px; }
        .post-item {
            background: #f8f9fa;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }
        .status-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .status-success { background: #d4edda; color: #155724; }
        .status-failed { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 English Learning AI Agent</h1>
            <p>Powered by GLM-5.1 | Auto-posting to Facebook</p>
            <p style="font-size:0.9em;color:#888;">Next posts: 9:00 AM, 1:00 PM, 5:00 PM, 8:00 PM</p>
        </div>
        
        <div class="grid">
            <!-- Generate Post Card -->
            <div class="card">
                <h2>✍️ Generate New Post</h2>
                <div class="form-group">
                    <label>Topic:</label>
                    <input type="text" id="topic" placeholder="e.g., Present Perfect Tense">
                </div>
                <div class="form-group">
                    <label>Category:</label>
                    <select id="category">
                        <option value="vocabulary">📚 Vocabulary</option>
                        <option value="grammar">📖 Grammar</option>
                        <option value="idiom">💬 Idiom</option>
                        <option value="quiz">🎯 Quiz</option>
                        <option value="general">📝 General</option>
                    </select>
                </div>
                <button class="btn" onclick="generatePost()" id="generateBtn">
                    🤖 Generate with AI
                </button>
                <div class="loading" id="generateLoading">
                    <div class="spinner"></div>
                    <p>AI is creating your post...</p>
                </div>
                <div class="alert alert-success" id="generateSuccess"></div>
                <div class="alert alert-error" id="generateError"></div>
                
                <div id="generatedContent" style="display:none; margin-top:20px;">
                    <h3>Generated Content:</h3>
                    <textarea id="postContent" readonly></textarea>
                    <button class="btn btn-success" onclick="postToFacebook()" id="postBtn">
                        📤 Post to Facebook Now
                    </button>
                </div>
            </div>
            
            <!-- Stats Card -->
            <div class="card">
                <h2>📊 Statistics</h2>
                <div class="stats" id="statsContainer">
                    <div class="stat-box">
                        <div class="stat-number">-</div>
                        <div class="stat-label">Total Posts</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">-</div>
                        <div class="stat-label">Successful</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">-</div>
                        <div class="stat-label">Failed</div>
                    </div>
                </div>
                <button class="btn" onclick="loadStats()" style="background: #6c757d;">
                    🔄 Refresh Stats
                </button>
                
                <h3 style="margin-top:20px;">Recent Posts</h3>
                <div class="recent-posts" id="recentPosts">
                    <p style="color:#888;">Loading...</p>
                </div>
            </div>
        </div>
        
        <!-- Quick Actions Card -->
        <div class="card">
            <h2>⚡ Quick Actions</h2>
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:10px;">
                <button class="btn" onclick="quickGenerate('vocabulary')">
                    📚 Generate Word of Day
                </button>
                <button class="btn" onclick="quickGenerate('grammar')">
                    📖 Generate Grammar Tip
                </button>
                <button class="btn" onclick="quickGenerate('idiom')">
                    💬 Generate Idiom Post
                </button>
                <button class="btn" onclick="quickGenerate('quiz')">
                    🎯 Generate Quiz
                </button>
            </div>
        </div>
    </div>
    
    <script>
        let generatedContent = '';
        let generatedTopic = '';
        let generatedCategory = '';
        
        // Load stats on page load
        window.onload = function() {
            loadStats();
            loadRecentPosts();
        };
        
        async function generatePost() {
            const topic = document.getElementById('topic').value || 'English Vocabulary';
            const category = document.getElementById('category').value;
            
            // Show loading
            document.getElementById('generateLoading').style.display = 'block';
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('generatedContent').style.display = 'none';
            hideAlerts();
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({topic, category})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    generatedContent = data.content;
                    generatedTopic = data.topic;
                    generatedCategory = data.category;
                    
                    document.getElementById('postContent').value = data.content;
                    document.getElementById('generatedContent').style.display = 'block';
                    
                    showAlert('generateSuccess', '✅ Post generated successfully!');
                } else {
                    showAlert('generateError', '❌ ' + data.error);
                }
            } catch (error) {
                showAlert('generateError', '❌ Failed to generate post');
            } finally {
                document.getElementById('generateLoading').style.display = 'none';
                document.getElementById('generateBtn').disabled = false;
            }
        }
        
        async function postToFacebook() {
            if (!generatedContent) {
                alert('Please generate a post first!');
                return;
            }
            
            document.getElementById('postBtn').disabled = true;
            
            try {
                const response = await fetch('/api/post', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: generatedContent,
                        topic: generatedTopic,
                        category: generatedCategory
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Posted successfully to Facebook!\nPost ID: ' + data.post_id);
                    loadStats();
                    loadRecentPosts();
                } else {
                    alert('❌ Failed to post: ' + data.error);
                }
            } catch (error) {
                alert('❌ Error posting to Facebook');
            } finally {
                document.getElementById('postBtn').disabled = false;
            }
        }
        
        async function quickGenerate(category) {
            document.getElementById('category').value = category;
            const topics = {
                'vocabulary': 'Resilient',
                'grammar': 'Present Perfect Tense',
                'idiom': 'Break the ice',
                'quiz': 'Common Grammar Mistakes'
            };
            document.getElementById('topic').value = topics[category] || '';
            await generatePost();
        }
        
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                const container = document.getElementById('statsContainer');
                container.innerHTML = `
                    <div class="stat-box">
                        <div class="stat-number">${data.total_posts}</div>
                        <div class="stat-label">Total Posts</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${data.successful_posts}</div>
                        <div class="stat-label">Successful</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${data.failed_posts}</div>
                        <div class="stat-label">Failed</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        async function loadRecentPosts() {
            try {
                const response = await fetch('/api/recent-posts');
                const data = await response.json();
                
                if (data.success && data.posts.length > 0) {
                    let html = '';
                    data.posts.forEach(post => {
                        html += `
                            <div class="post-item">
                                <span>${post.topic} (${post.category})</span>
                                <span class="status-badge status-${post.status}">${post.status}</span>
                            </div>
                        `;
                    });
                    document.getElementById('recentPosts').innerHTML = html;
                } else {
                    document.getElementById('recentPosts').innerHTML = '<p style="color:#888;">No posts yet</p>';
                }
            } catch (error) {
                console.error('Error loading recent posts:', error);
            }
        }
        
        function showAlert(id, message) {
            const alert = document.getElementById(id);
            alert.textContent = message;
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }
        
        function hideAlerts() {
            document.querySelectorAll('.alert').forEach(alert => {
                alert.style.display = 'none';
            });
        }
    </script>
</body>
</html>
